[% PROCESS settings/header.html %]

    [% WRAPPER setting title="PLUGIN_CAPRICE_MENU_LOCATION" desc="PLUGIN_CAPRICE_MENU_LOCATION_DESC" %]
    <div class="prefDesc">
        <select name="pref_menuLocation" class="stdedit">
                <option value="radio"[% IF prefs.menuLocation == "radio" %] selected[% END %]>[% 'PLUGIN_CAPRICE_MENU_LOCATION_RADIO' | getstring %]</option>
                <option value="apps"[% IF prefs.menuLocation == "apps" %] selected[% END %]>[% 'PLUGIN_CAPRICE_MENU_LOCATION_APPS' | getstring %]</option> 
        </select>
    </div>
    [% END %]

    [% WRAPPER setting title="PLUGIN_CAPRICE_GROUP_BY_GENRE" desc="PLUGIN_CAPRICE_GROUP_BY_GENRE_DESC" %]
        <input type="checkbox" class="stdedit" name="pref_groupByGenre"[% IF prefs.groupByGenre %] checked[% END %]>
    [% END %]

[% PROCESS settings/footer.html %]
